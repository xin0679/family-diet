<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#10b981">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="家庭食谱">
    <meta name="description" content="根据家庭成员生辰八字和体质，智能推荐一周养生食谱">
    <meta name="format-detection" content="telephone=no">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Icons -->
    <link rel="apple-touch-icon" href="icons/icon.svg">
    <link rel="icon" type="image/svg+xml" sizes="any" href="icons/icon.svg">
    
    <title>家庭食谱 - 智能养生膳食</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 首页 -->
            <section id="home-page" class="page active">
                <!-- 节气卡片 -->
                <div class="solar-term-card">
                    <div class="solar-term-icon">🌸</div>
                    <div class="solar-term-info">
                        <div class="solar-term-name" id="current-solar-term">春分</div>
                        <div class="solar-term-date" id="solar-term-date">3月20日 - 4月4日</div>
                        <div class="solar-term-tip" id="solar-term-tip">春分时节，阴阳平衡，宜养肝健脾</div>
                    </div>
                </div>

                <!-- 今日食谱 -->
                <div class="section-header">
                    <h2>今日食谱</h2>
                    <span class="date-today" id="today-date">3月18日 周三</span>
                </div>
                <div class="today-menu" id="today-menu">
                    <!-- 今日四餐动态生成 -->
                </div>

                <!-- 本周概览入口 -->
                <div class="week-preview-section" id="week-preview">
                    <div class="section-header">
                        <h2>本周计划</h2>
                        <button class="btn-text" data-page="weekly">查看全部 →</button>
                    </div>
                    <div class="week-days-scroll" id="week-days-preview">
                        <!-- 本周日期预览 -->
                    </div>
                </div>

                <!-- 家庭成员快捷入口 -->
                <div class="members-quick-section">
                    <div class="section-header">
                        <h2>家庭成员</h2>
                        <button class="btn-text" data-page="members">管理 →</button>
                    </div>
                    <div class="members-scroll" id="home-members-list">
                        <!-- 成员头像列表 -->
                    </div>
                </div>
            </section>

            <!-- 菜谱库页面 -->
            <section id="recipes-page" class="page">
                <header class="page-header-simple">
                    <h1>菜谱库</h1>
                </header>
                <div class="search-bar">
                    <input type="text" placeholder="搜索菜谱..." id="recipe-search">
                </div>
                <div class="filter-tabs">
                    <button class="filter-tab active" data-filter="all">全部</button>
                    <button class="filter-tab" data-filter="breakfast">早餐</button>
                    <button class="filter-tab" data-filter="lunch">午餐</button>
                    <button class="filter-tab" data-filter="dinner">晚餐</button>
                </div>
                <div class="recipes-list" id="recipes-list">
                    <!-- 菜谱列表动态生成 -->
                </div>
            </section>

            <!-- 周计划页面 -->
            <section id="weekly-page" class="page">
                <header class="page-header-simple">
                    <h1>一周食谱</h1>
                    <div class="week-nav">
                        <button class="week-nav-btn" id="prev-week">‹</button>
                        <span class="week-current" id="week-display">本周</span>
                        <button class="week-nav-btn" id="next-week">›</button>
                    </div>
                </header>
                <div class="week-days-container" id="weekly-menu">
                    <!-- 一周食谱纵向列表 -->
                </div>
            </section>

            <!-- 成员页面 -->
            <section id="members-page" class="page">
                <header class="page-header-simple">
                    <h1>家庭成员</h1>
                    <button class="btn-icon" id="add-member-btn">+</button>
                </header>
                <div class="members-list" id="members-list">
                    <!-- 成员列表动态生成 -->
                </div>
            </section>

            <!-- 我的页面 -->
            <section id="profile-page" class="page">
                <header class="page-header-simple">
                    <h1>我的</h1>
                </header>
                <div class="profile-section">
                    <div class="profile-card">
                        <div class="profile-avatar">🥗</div>
                        <div class="profile-name">家庭食谱</div>
                        <div class="profile-version">v1.0</div>
                    </div>
                    
                    <div class="menu-list">
                        <div class="menu-item" id="health-analysis-btn">
                            <span class="menu-icon">💚</span>
                            <span class="menu-text">健康分析</span>
                            <span class="menu-arrow">›</span>
                        </div>
                        <div class="menu-item" id="data-export-btn">
                            <span class="menu-icon">📤</span>
                            <span class="menu-text">导出数据</span>
                            <span class="menu-arrow">›</span>
                        </div>
                        <div class="menu-item" id="data-import-btn">
                            <span class="menu-icon">📥</span>
                            <span class="menu-text">导入数据</span>
                            <span class="menu-arrow">›</span>
                        </div>
                        <div class="menu-item" id="clear-data-btn">
                            <span class="menu-icon">🗑️</span>
                            <span class="menu-text">清除所有数据</span>
                            <span class="menu-arrow">›</span>
                        </div>
                    </div>
                    
                    <div class="menu-list">
                        <div class="menu-item">
                            <span class="menu-icon">ℹ️</span>
                            <span class="menu-text">关于应用</span>
                            <span class="menu-arrow">›</span>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <!-- 底部导航栏 -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-page="home">
                <span class="nav-icon">🏠</span>
                <span class="nav-text">首页</span>
            </button>
            <button class="nav-item" data-page="recipes">
                <span class="nav-icon">🍳</span>
                <span class="nav-text">菜谱</span>
            </button>
            <button class="nav-item" data-page="weekly">
                <span class="nav-icon">📅</span>
                <span class="nav-text">周计划</span>
            </button>
            <button class="nav-item" data-page="members">
                <span class="nav-icon">👨‍👩‍👧‍👦</span>
                <span class="nav-text">成员</span>
            </button>
            <button class="nav-item" data-page="profile">
                <span class="nav-icon">👤</span>
                <span class="nav-text">我的</span>
            </button>
        </nav>
    </div>

    <!-- 添加成员弹窗 -->
    <div class="modal" id="member-modal">
        <div class="modal-content">
            <header class="modal-header">
                <h2>添加家庭成员</h2>
                <button class="modal-close" id="close-modal">&times;</button>
            </header>
            <form class="member-form" id="member-form">
                <div class="form-group">
                    <label>姓名</label>
                    <input type="text" name="name" required placeholder="请输入姓名">
                </div>
                <div class="form-group">
                    <label>性别</label>
                    <select name="gender" required>
                        <option value="">请选择</option>
                        <option value="male">男</option>
                        <option value="female">女</option>
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>出生日期</label>
                        <input type="date" name="birthdate" required>
                    </div>
                    <div class="form-group">
                        <label>出生时间</label>
                        <input type="time" name="birthtime">
                    </div>
                </div>
                <div class="form-group">
                    <label>八字排盘精度</label>
                    <select name="bazi-precision">
                        <option value="simple">简化版（推荐）</option>
                        <option value="precise">精确版（考虑节气/真太阳时）</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>基础疾病/身体状况</label>
                    <textarea name="conditions" rows="3" placeholder="如有高血压、糖尿病等请描述"></textarea>
                </div>
                <div class="form-group">
                    <label>饮食偏好/禁忌</label>
                    <textarea name="preferences" rows="2" placeholder="如：不吃辣、素食、过敏食材等"></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-outline" id="cancel-btn">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 菜谱详情弹窗 -->
    <div class="modal" id="recipe-modal">
        <div class="modal-content modal-full">
            <header class="modal-header">
                <h2 id="recipe-modal-title">菜谱详情</h2>
                <button class="modal-close" id="close-recipe-modal">&times;</button>
            </header>
            <div class="recipe-detail" id="recipe-detail">
                <!-- 菜谱详情动态生成 -->
            </div>
        </div>
    </div>

    <!-- 健康分析弹窗 -->
    <div class="modal" id="health-modal">
        <div class="modal-content modal-full">
            <header class="modal-header">
                <h2>健康分析</h2>
                <button class="modal-close" id="close-health-modal">&times;</button>
            </header>
            <div class="health-content" id="health-content">
                <!-- 健康分析动态生成 -->
            </div>
        </div>
    </div>

    <!-- PWA 安装提示 -->
    <div id="pwa-install-banner" style="display: none; position: fixed; bottom: 80px; left: 16px; right: 16px; background: white; padding: 16px 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); z-index: 10000;">
        <div style="display: flex; align-items: center; justify-content: space-between;">
            <div style="display: flex; align-items: center; gap: 12px;">
                <span style="font-size: 40px;">🥗</span>
                <div>
                    <div style="font-weight: 600; color: #1f2937; font-size: 16px;">安装家庭食谱</div>
                    <div style="font-size: 13px; color: #6b7280; margin-top: 2px;">添加到主屏幕，离线也能使用</div>
                </div>
            </div>
            <div style="display: flex; gap: 8px;">
                <button id="pwa-dismiss" style="padding: 8px 12px; border: none; background: #f3f4f6; color: #6b7280; border-radius: 8px; font-size: 14px; cursor: pointer;">稍后</button>
                <button id="pwa-install" style="padding: 8px 16px; border: none; background: #10b981; color: white; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer;">安装</button>
            </div>
        </div>
    </div>

    <!-- PWA 离线提示 -->
    <div id="offline-indicator" style="display: none; position: fixed; top: 0; left: 0; right: 0; background: #f59e0b; color: white; text-align: center; padding: 8px; font-size: 13px; z-index: 10001;">
        当前处于离线模式
    </div>

    <script>
        // PWA 支持
        (function() {
            'use strict';
            
            // 注册 Service Worker
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register('/sw.js')
                        .then((registration) => {
                            console.log('[PWA] SW registered:', registration.scope);
                        })
                        .catch((error) => {
                            console.log('[PWA] SW registration failed:', error);
                        });
                });
            }
            
            // PWA 安装提示
            let deferredPrompt;
            const installBanner = document.getElementById('pwa-install-banner');
            const installBtn = document.getElementById('pwa-install');
            const dismissBtn = document.getElementById('pwa-dismiss');
            
            const isInstalled = window.matchMedia('(display-mode: standalone)').matches || 
                               window.navigator.standalone === true;
            
            if (!isInstalled) {
                window.addEventListener('beforeinstallprompt', (e) => {
                    e.preventDefault();
                    deferredPrompt = e;
                    
                    setTimeout(() => {
                        if (!localStorage.getItem('pwa-dismissed')) {
                            installBanner.style.display = 'block';
                        }
                    }, 3000);
                });
            }
            
            installBtn.addEventListener('click', async () => {
                if (!deferredPrompt) return;
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    installBanner.style.display = 'none';
                }
                deferredPrompt = null;
            });
            
            dismissBtn.addEventListener('click', () => {
                localStorage.setItem('pwa-dismissed', 'true');
                installBanner.style.display = 'none';
            });
            
            // 在线/离线状态
            const offlineIndicator = document.getElementById('offline-indicator');
            function updateOnlineStatus() {
                offlineIndicator.style.display = navigator.onLine ? 'none' : 'block';
            }
            window.addEventListener('online', updateOnlineStatus);
            window.addEventListener('offline', updateOnlineStatus);
            updateOnlineStatus();
        })();
    </script>

    <script src="js/data.js"></script>
    <script src="js/bazi.js"></script>
    <script src="js/health.js"></script>
    <script src="js/recipes.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
