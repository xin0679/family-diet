<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#10b981">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="家庭食谱">
    <meta name="description" content="根据家庭成员生辰八字和体质，智能推荐一周养生食谱">
    <meta name="format-detection" content="telephone=no">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Icons -->
    <link rel="apple-touch-icon" href="icons/icon.svg">
    <link rel="icon" type="image/svg+xml" sizes="any" href="icons/icon.svg">
    
    <title>家庭食谱 - 智能养生膳食</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- 侧边导航 -->
        <nav class="sidebar">
            <div class="logo">
                <span class="logo-icon">🥗</span>
                <span class="logo-text">家庭食谱</span>
            </div>
            <ul class="nav-menu">
                <li class="nav-item active" data-page="members">
                    <span class="nav-icon">👨‍👩‍👧‍👦</span>
                    <span class="nav-text">家庭成员</span>
                </li>
                <li class="nav-item" data-page="weekly">
                    <span class="nav-icon">📅</span>
                    <span class="nav-text">一周食谱</span>
                </li>
                <li class="nav-item" data-page="recipes">
                    <span class="nav-icon">🍳</span>
                    <span class="nav-text">菜谱库</span>
                </li>
                <li class="nav-item" data-page="health">
                    <span class="nav-icon">💚</span>
                    <span class="nav-text">健康分析</span>
                </li>
            </ul>
        </nav>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 家庭成员页面 -->
            <section id="members-page" class="page active">
                <header class="page-header">
                    <h1>家庭成员</h1>
                    <button class="btn btn-primary" id="add-member-btn">
                        <span>+</span> 添加成员
                    </button>
                </header>
                <div class="members-grid" id="members-list">
                    <!-- 成员卡片动态生成 -->
                </div>
            </section>

            <!-- 一周食谱页面 -->
            <section id="weekly-page" class="page">
                <header class="page-header">
                    <h1>一周食谱</h1>
                    <div class="week-selector">
                        <button class="btn btn-outline" id="prev-week">← 上周</button>
                        <span class="current-week" id="week-display">本周</span>
                        <button class="btn btn-outline" id="next-week">下周 →</button>
                    </div>
                </header>
                <div class="weekly-menu" id="weekly-menu">
                    <!-- 一周食谱动态生成 -->
                </div>
            </section>

            <!-- 菜谱库页面 -->
            <section id="recipes-page" class="page">
                <header class="page-header">
                    <h1>菜谱库</h1>
                    <div class="search-box">
                        <input type="text" placeholder="搜索菜谱..." id="recipe-search">
                    </div>
                </header>
                <div class="recipes-filter">
                    <button class="filter-btn active" data-filter="all">全部</button>
                    <button class="filter-btn" data-filter="breakfast">早餐</button>
                    <button class="filter-btn" data-filter="lunch">午餐</button>
                    <button class="filter-btn" data-filter="dinner">晚餐</button>
                    <button class="filter-btn" data-filter="snack">下午茶</button>
                </div>
                <div class="recipes-grid" id="recipes-list">
                    <!-- 菜谱卡片动态生成 -->
                </div>
            </section>

            <!-- 健康分析页面 -->
            <section id="health-page" class="page">
                <header class="page-header">
                    <h1>健康分析</h1>
                </header>
                <div class="health-dashboard" id="health-dashboard">
                    <!-- 健康分析动态生成 -->
                </div>
            </section>
        </main>
    </div>

    <!-- 添加成员弹窗 -->
    <div class="modal" id="member-modal">
        <div class="modal-content">
            <header class="modal-header">
                <h2>添加家庭成员</h2>
                <button class="modal-close" id="close-modal">&times;</button>
            </header>
            <form class="member-form" id="member-form">
                <div class="form-group">
                    <label>姓名</label>
                    <input type="text" name="name" required placeholder="请输入姓名">
                </div>
                <div class="form-group">
                    <label>性别</label>
                    <select name="gender" required>
                        <option value="">请选择</option>
                        <option value="male">男</option>
                        <option value="female">女</option>
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>出生日期</label>
                        <input type="date" name="birthdate" required>
                    </div>
                    <div class="form-group">
                        <label>出生时间</label>
                        <input type="time" name="birthtime">
                    </div>
                </div>
                <div class="form-group">
                    <label>八字排盘精度</label>
                    <select name="bazi-precision">
                        <option value="simple">简化版（推荐）</option>
                        <option value="precise">精确版（考虑节气/真太阳时）</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>基础疾病/身体状况</label>
                    <textarea name="conditions" rows="3" placeholder="如有高血压、糖尿病等请描述"></textarea>
                </div>
                <div class="form-group">
                    <label>饮食偏好/禁忌</label>
                    <textarea name="preferences" rows="2" placeholder="如：不吃辣、素食、过敏食材等"></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-outline" id="cancel-btn">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 菜谱详情弹窗 -->
    <div class="modal" id="recipe-modal">
        <div class="modal-content modal-large">
            <header class="modal-header">
                <h2 id="recipe-modal-title">菜谱详情</h2>
                <button class="modal-close" id="close-recipe-modal">&times;</button>
            </header>
            <div class="recipe-detail" id="recipe-detail">
                <!-- 菜谱详情动态生成 -->
            </div>
        </div>
    </div>

    <!-- PWA 安装提示 -->
    <div id="pwa-install-banner" style="display: none; position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 16px 20px; box-shadow: 0 -4px 20px rgba(0,0,0,0.1); z-index: 10000; transform: translateY(100%); transition: transform 0.3s ease;">
        <div style="display: flex; align-items: center; justify-content: space-between; max-width: 600px; margin: 0 auto;">
            <div style="display: flex; align-items: center; gap: 12px;">
                <span style="font-size: 32px;">🥗</span>
                <div>
                    <div style="font-weight: 600; color: #1f2937;">安装家庭食谱</div>
                    <div style="font-size: 13px; color: #6b7280;">添加到主屏幕，离线也能使用</div>
                </div>
            </div>
            <div style="display: flex; gap: 8px;">
                <button id="pwa-dismiss" style="padding: 8px 16px; border: none; background: none; color: #6b7280; font-size: 14px; cursor: pointer;">稍后</button>
                <button id="pwa-install" style="padding: 8px 20px; border: none; background: #10b981; color: white; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer;">安装</button>
            </div>
        </div>
    </div>

    <!-- PWA 离线提示 -->
    <div id="offline-indicator" style="display: none; position: fixed; top: 0; left: 0; right: 0; background: #f59e0b; color: white; text-align: center; padding: 8px; font-size: 13px; z-index: 10001;">
        当前处于离线模式，部分功能可能受限
    </div>

    <script>
        // PWA 支持
        (function() {
            'use strict';
            
            // 注册 Service Worker
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register('/sw.js')
                        .then((registration) => {
                            console.log('[PWA] SW registered:', registration.scope);
                            
                            // 检查更新
                            registration.addEventListener('updatefound', () => {
                                const newWorker = registration.installing;
                                newWorker.addEventListener('statechange', () => {
                                    if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                        // 有新版本可用
                                        if (confirm('发现新版本，是否刷新更新？')) {
                                            window.location.reload();
                                        }
                                    }
                                });
                            });
                        })
                        .catch((error) => {
                            console.log('[PWA] SW registration failed:', error);
                        });
                });
            }
            
            // PWA 安装提示
            let deferredPrompt;
            const installBanner = document.getElementById('pwa-install-banner');
            const installBtn = document.getElementById('pwa-install');
            const dismissBtn = document.getElementById('pwa-dismiss');
            
            // 检查是否已经安装
            const isInstalled = window.matchMedia('(display-mode: standalone)').matches || 
                               window.navigator.standalone === true;
            
            if (!isInstalled) {
                window.addEventListener('beforeinstallprompt', (e) => {
                    // 阻止默认提示
                    e.preventDefault();
                    deferredPrompt = e;
                    
                    // 显示自定义安装提示（延迟3秒，避免打扰）
                    setTimeout(() => {
                        if (!localStorage.getItem('pwa-dismissed')) {
                            installBanner.style.display = 'block';
                            setTimeout(() => {
                                installBanner.style.transform = 'translateY(0)';
                            }, 100);
                        }
                    }, 3000);
                });
            }
            
            // 安装按钮
            installBtn.addEventListener('click', async () => {
                if (!deferredPrompt) return;
                
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                
                if (outcome === 'accepted') {
                    console.log('[PWA] User accepted install');
                    installBanner.style.transform = 'translateY(100%)';
                    setTimeout(() => {
                        installBanner.style.display = 'none';
                    }, 300);
                }
                
                deferredPrompt = null;
            });
            
            // 关闭按钮
            dismissBtn.addEventListener('click', () => {
                localStorage.setItem('pwa-dismissed', 'true');
                installBanner.style.transform = 'translateY(100%)';
                setTimeout(() => {
                    installBanner.style.display = 'none';
                }, 300);
            });
            
            // 已安装事件
            window.addEventListener('appinstalled', () => {
                console.log('[PWA] App installed');
                installBanner.style.transform = 'translateY(100%)';
                setTimeout(() => {
                    installBanner.style.display = 'none';
                }, 300);
                deferredPrompt = null;
            });
            
            // 在线/离线状态检测
            const offlineIndicator = document.getElementById('offline-indicator');
            
            function updateOnlineStatus() {
                if (navigator.onLine) {
                    offlineIndicator.style.display = 'none';
                } else {
                    offlineIndicator.style.display = 'block';
                }
            }
            
            window.addEventListener('online', updateOnlineStatus);
            window.addEventListener('offline', updateOnlineStatus);
            updateOnlineStatus();
        })();
    </script>

    <script src="js/data.js"></script>
    <script src="js/bazi.js"></script>
    <script src="js/health.js"></script>
    <script src="js/recipes.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
